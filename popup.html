<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>システム稼働状況モニター (監査用)</title>
    <style>
      body {
        background-color: #0f172a;
        color: #38bdf8;
        font-family: 'Courier New', Courier, monospace;
        padding: 10px;
        margin: 0;
        width: auto;
      }
      .container {
        border: 1px solid #334155;
        background-color: #1e293b;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        transition: color 0.3s ease, border-color 0.3s ease;
      }
      h1 {
        font-size: 1.2rem;
        color: #f8fafc;
        border-bottom: 2px solid #334155;
        padding-bottom: 10px;
        margin-top: 0;
      }
      .status-box {
        background-color: #0f172a;
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 15px;
        font-size: 0.9rem;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .status-val {
        color: #4ade80;
        font-weight: bold;
      }
      
      /* 実績インジケーター用スタイル */
      .achievement-badge {
        font-size: 0.8rem;
        color: #eab308;
        background-color: rgba(234, 179, 8, 0.1);
        border: 1px solid rgba(234, 179, 8, 0.3);
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: bold;
      }
      
      /* ゲージ用のカスタムスタイル */
      .gauge-container {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.85rem;
      }
      .gauge-label {
        min-width: 85px;
      }
      progress {
        flex: 1;
        height: 12px;
        border-radius: 6px;
        background-color: #1e293b;
        border: 1px solid #334155;
        overflow: hidden;
      }
      /* ==========================================
         メンタル残量に応じた状態定義
         ========================================== */

      /* 71〜100：緑（安定） */
      .mental-stable::-webkit-progress-value { background-color: #22c55e !important; transition: width 0.3s ease; }
      .mental-stable::-moz-progress-bar { background-color: #22c55e !important; }

      /* 41〜70：黄色（疲労） */
      .mental-fatigue::-webkit-progress-value { background-color: #eab308 !important; transition: width 0.3s ease; }
      .mental-fatigue::-moz-progress-bar { background-color: #eab308 !important; }

      /* 21〜40：オレンジ（限界接近） */
      .mental-danger::-webkit-progress-value { background-color: #f97316 !important; transition: width 0.3s ease; }
      .mental-danger::-moz-progress-bar { background-color: #f97316 !important; }

      /* 0〜20：赤＋高速点滅（精神崩壊寸前） */
      .mental-critical::-webkit-progress-value { background-color: #ef4444 !important; transition: width 0.3s ease; }
      .mental-critical::-moz-progress-bar { background-color: #ef4444 !important; }
      .mental-critical {
        animation: mental-blink 0.5s infinite alternate ease-in-out;
      }

      /* 精神崩壊バー点滅 */
      @keyframes mental-blink {
        0% { opacity: 1; filter: drop-shadow(0 0 2px #ef4444); }
        100% { opacity: 0.3; filter: drop-shadow(0 0 8px #ef4444); }
      }
      
      /* 上司距離ゲージの色（デフォルト：赤・警告系） */
      #gauge-distance::-webkit-progress-value { background-color: #ef4444; transition: width 0.3s ease; }
      #gauge-distance::-moz-progress-bar { background-color: #ef4444; }

      #log-area {
        background-color: #020617;
        color: #a7f3d0;
        height: 200px;
        overflow-y: scroll;
        padding: 10px;
        border-radius: 4px;
        font-size: 0.8rem;
        line-height: 1.5;
        border: 1px solid #1e293b;
      }
      
      /* 獲得実績リストエリア用スタイル */
      .achievement-panel {
        margin-top: 15px;
        background-color: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 4px;
        padding: 8px;
        font-size: 0.75rem;
      }
      .achievement-title {
        color: #94a3b8;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
      }
      #achievement-list {
        color: #eab308;
        max-height: 60px;
        overflow-y: auto;
        line-height: 1.4;
      }

      .btn-panel {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }
      button {
        background-color: #0284c7;
        color: white;
        border: none;
        padding: 8px 15px;
        font-size: 0.9rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        flex: 1;
      }
      button:hover {
        background-color: #0369a1;
      }
      button:disabled {
        background-color: #334155;
        color: #64748b;
        cursor: not-allowed;
      }
      #btn-escape {
        background-color: #ef4444;
      }
      #btn-escape:hover {
        background-color: #dc2626;
      }

      /* ミュートボタン専用スタイル */
      #btn-mute {
        background-color: #475569;
        font-size: 0.8rem;
        padding: 6px 12px;
        transition: background-color 0.2s ease;
      }
      #btn-mute:hover {
        background-color: #334155;
      }
      #btn-mute.muted {
        background-color: #b91c1c; /* ミュート時は赤色で警告感を出す */
      }
      #btn-mute.muted:hover {
        background-color: #991b1b;
      }

      /* アラート */
      @keyframes red-alert-pulse {
        0% { background-color: #1e293b; box-shadow: inset 0 0 20px rgba(239, 68, 68, 0); }
        50% { background-color: #450a0a; box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.6); border-color: #ef4444; }
        100% { background-color: #1e293b; box-shadow: inset 0 0 20px rgba(239, 68, 68, 0); }
      }

      .danger-zone {
        animation: red-alert-pulse 1.5s infinite ease-in-out;
        border-color: #ef4444 !important;
        color: #fca5a5 !important;
      }
      .danger-zone .gauge-label {
        color: #ef4444 !important;
      }

      /* クラッカー・紙吹雪エフェクト */
      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        top: -10px;
        z-index: 9999;
        pointer-events: none;
        border-radius: 2px;
        animation: fall linear forwards;
      }

      @keyframes fall {
        0% {
          transform: translateY(0) rotate(0deg) translateX(0);
          opacity: 1;
        }
        100% {
          transform: translateY(105vh) rotate(720deg) translateX(var(--x-drift));
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>

    <div class="container">
      <h1>EMPLOYEE SURVIVAL SYSTEM v1.0.6</h1>

      <div class="status-box">
        <div class="status-row">
          <div>ステータス: <span id="status" class="status-val">READY</span></div>
          <div class="achievement-badge">🏆 <span id="achieve-count">0</span> / <span id="achieve-total">0</span></div>
        </div>
        
        <div class="gauge-container">
          <span class="gauge-label">メンタル: <span id="mental" style="color: #fbbf24;">100</span></span>
          <progress id="gauge-mental" max="100" value="100"></progress>
        </div>
        
        <div class="gauge-container">
          <span class="gauge-label">上司の距離: <span id="distance" style="color: #f87171;">5.0m</span></span>
          <progress id="gauge-distance" max="5" value="5"></progress>
        </div>
      </div>

      <div style="margin-bottom: 15px; background-color: #0f172a; padding: 10px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem;">
        <label for="input-target-time" style="color: #38bdf8;">目標脱出時刻 (定時):</label>
        <input type="time" id="input-target-time" value="17:45" style="background-color: #1e293b; color: #4ade80; border: 1px solid #334155; border-radius: 4px; padding: 3px 5px; font-family: inherit; font-size: 0.9rem; outline: none; width: 90px;">
      </div>

      <div style="margin-bottom: 15px; border: 1px dashed #334155; padding: 10px; border-radius: 4px;">
        <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px;">MENTAL LIFEHACKS:</div>
        <div style="display: flex; flex-wrap: wrap; gap: 5px;">
          <button id="btn-toilet" style="background-color: #0d9488; font-size: 0.75rem; padding: 5px 10px; flex: 1; min-width: 80px;">トイレ籠城</button>
          <button id="btn-cafe" style="background-color: #b45309; font-size: 0.75rem; padding: 5px 10px; flex: 1; min-width: 80px;">エナドリ摂取</button>
          <button id="btn-oshi" style="background-color: #db2777; font-size: 0.75rem; padding: 5px 10px; flex: 1; min-width: 80px;">推し凝視</button>
        </div>
      </div>

      <!-- ★追加：サウンド一括制御パネル -->
      <div style="margin-bottom: 15px; background-color: #0f172a; padding: 8px 10px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 0.8rem; color: #94a3b8;">オーディオ出力設定:</span>
        <button id="btn-mute" class="btn-secondary">🔊 サウンド: ON</button>
      </div>

      <div id="log-area">
        <div style="color: #a7f3d0">[SYSTEM] 待機中... プログラムを起動してください。</div>
      </div>

      <div class="achievement-panel">
        <div class="achievement-title">
          <span>UNLOCKED ACHIEVEMENTS:</span>
        </div>
        <div id="achievement-list">
          <span style="color: #64748b;">(未解除)</span>
        </div>
      </div>

      <div class="btn-panel">
        <button id="btn-start">プログラム起動</button>
        <button id="btn-escape">緊急定時ダッシュ</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
