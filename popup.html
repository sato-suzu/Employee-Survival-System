<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>システム稼働状況モニター (監査用)</title>
    <style>
      body {
        background-color: #0f172a;
        color: #38bdf8;
        font-family: 'Courier New', Courier, monospace;
        padding: 10px;
        margin: 0;
        width: auto;
      }
      .container {
        border: 1px solid #334155;
        background-color: #1e293b;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      h1 {
        font-size: 1.2rem;
        color: #f8fafc;
        border-bottom: 2px solid #334155;
        padding-bottom: 10px;
        margin-top: 0;
      }
      .status-box {
        display: flex;
        justify-content: space-between;
        background-color: #0f172a;
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 15px;
        font-size: 0.9rem;
      }
      .status-val {
        color: #4ade80;
        font-weight: bold;
      }
      #log-area {
        background-color: #020617;
        color: #a7f3d0;
        height: 200px;
        overflow-y: scroll;
        padding: 10px;
        border-radius: 4px;
        font-size: 0.8rem;
        line-height: 1.5;
        border: 1px solid #1e293b;
      }
      .btn-panel {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }
      button {
        background-color: #0284c7;
        color: white;
        border: none;
        padding: 8px 15px;
        font-size: 0.9rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        flex: 1;
      }
      button:hover {
        background-color: #0369a1;
      }
      button:disabled {
        background-color: #334155;
        color: #64748b;
        cursor: not-allowed;
      }
      #btn-escape {
        background-color: #ef4444;
      }
      #btn-escape:hover {
        background-color: #dc2626;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <h1>EMPLOYEE SURVIVAL SYSTEM v1.0.4</h1>

      <div class="status-box">
        <div>ステータス: <span id="status" class="status-val">READY</span></div>
        <div>メンタル: <span id="mental" style="color: #fbbf24;">100</span></div>
        <div>上司の距離: <span id="distance" style="color: #f87171;">5.0m</span></div>
      </div>

      <!-- 定時設定フォーム -->
      <div style="margin-bottom: 15px; background-color: #0f172a; padding: 10px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem;">
        <label for="input-target-time" style="color: #38bdf8;">目標脱出時刻 (定時):</label>
        <input type="time" id="input-target-time" value="17:45" style="background-color: #1e293b; color: #4ade80; border: 1px solid #334155; border-radius: 4px; padding: 3px 5px; font-family: inherit; font-size: 0.9rem; outline: none;">
      </div>

      <!-- ライフハックボタンエリア -->
      <div style="margin-bottom: 15px; border: 1px dashed #334155; padding: 10px; border-radius: 4px;">
        <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px;">MENTAL LIFEHACKS:</div>
        <div style="display: flex; flex-wrap: wrap; gap: 5px;">
          <button id="btn-toilet" style="background-color: #0d9488; font-size: 0.75rem; padding: 5px 10px; flex: 1; min-width: 80px;">トイレ籠城</button>
          <button id="btn-cafe" style="background-color: #b45309; font-size: 0.75rem; padding: 5px 10px; flex: 1; min-width: 80px;">エナドリ摂取</button>
          <button id="btn-oshi" style="background-color: #db2777; font-size: 0.75rem; padding: 5px 10px; flex: 1; min-width: 80px;">推し凝視</button>
        </div>
      </div>

      <div id="log-area">[SYSTEM] 待機中... プログラムを起動してください。</div>

      <div class="btn-panel">
        <button id="btn-start">プログラム起動</button>
        <button id="btn-escape">緊急定時ダッシュ</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
