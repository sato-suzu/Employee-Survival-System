<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>システム稼働状況モニター (監査用)</title>
    <style>
      body {
        background-color: #0f172a;
        color: #38bdf8;
        font-family: 'Courier New', Courier, monospace;
        padding: 10px;
        margin: 0;
        width: auto;
      }
      .container {
        border: 1px solid #334155;
        background-color: #1e293b;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        transition: color 0.3s ease, border-color 0.3s ease;
      }
      h1 {
        font-size: 1.2rem;
        color: #f8fafc;
        border-bottom: 2px solid #334155;
        padding-bottom: 10px;
        margin-top: 0;
      }
      .status-box {
        background-color: #0f172a;
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 15px;
        font-size: 0.9rem;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .status-val {
        color: #4ade80;
        font-weight: bold;
      }
      
      /* 実績インジケーター用スタイル */
      .achievement-badge {
        font-size: 0.8rem;
        color: #eab308;
        background-color: rgba(234, 179, 8, 0.1);
        border: 1px solid rgba(234, 179, 8, 0.3);
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: bold;
      }
      
      /* ゲージ用のカスタムスタイル */
      .gauge-container {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.85rem;
      }
      .gauge-label {
        min-width: 85px;
      }

      /* --- [共通] プログレスバーの基底デザイン --- */
      progress {
        flex: 1;
        height: 12px;
        border-radius: 6px;
        background-color: #1e293b;
        border: 1px solid #334155;
        overflow: hidden;
      }

      /* ==========================================
         メンタル残量に応じた状態定義
         ========================================== */

      /* 71〜100：緑（安定） */
      .mental-stable::-webkit-progress-value { background-color: #22c55e !important; transition: width 0.3s ease; }
      .mental-stable::-moz-progress-bar { background-color: #22c55e !important; }

      /* 41〜70：黄色（疲労） */
      .mental-fatigue::-webkit-progress-value { background-color: #eab308 !important; transition: width 0.3s ease; }
      .mental-fatigue::-moz-progress-bar { background-color: #eab308 !important; }

      /* 21〜40：オレンジ（限界接近） */
      .mental-danger::-webkit-progress-value { background-color: #f97316 !important; transition: width 0.3s ease; }
      .mental-danger::-moz-progress-bar { background-color: #f97316 !important; }

      /* 0〜20：赤＋高速点滅（精神崩壊寸前） */
      .mental-critical::-webkit-progress-value { background-color: #ef4444 !important; transition: width 0.3s ease; }
      .mental-critical::-moz-progress-bar { background-color: #ef4444 !important; }
      .mental-critical {
        animation: mental-blink 0.5s infinite alternate ease-in-out;
      }

      /* 精神崩壊バー点滅 */
      @keyframes mental-blink {
        0% { opacity: 1; filter: drop-shadow(0 0 2px #ef4444); }
        100% { opacity: 0.3; filter: drop-shadow(0 0 8px #ef4444); }
      }
      
      /* --- 上司距離ゲージの色 --- */
      #gauge-distance::-webkit-progress-value { background-color: #ef4444; transition: width 0.3s ease; }
      #gauge-distance::-moz-progress-bar { background-color: #ef4444; }

      #log-area {
        background-color: #020617;
        color: #a7f3d0;
        height: 200px;
        overflow-y: scroll;
        padding: 10px;
        border-radius: 4px;
        font-size: 0.8rem;
        line-height: 1.5;
        border: 1px solid #1e293b;
      }
      
      /* 獲得実績リストエリア用スタイル */
      .achievement-panel {
        margin-top: 15px;
        background-color: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 4px;
        padding: 8px;
        font-size: 0.75rem;
      }
      .achievement-title {
        color: #94a3b8;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
      }
      #achievement-list {
        color: #eab308;
        max-height: 60px;
        overflow-y: auto;
        line-height: 1.4;
      }

      .btn-panel {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }
      button {
        background-color: #0284c7;
        color: white;
        border: none;
        padding: 8px 15px;
        font-size: 0.9rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        flex: 1;
      }
      button:hover {
        background-color: #0369a1;
      }
